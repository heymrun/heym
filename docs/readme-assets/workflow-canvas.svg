<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" width="1280" height="520" fill="none" font-family="Inter, system-ui, sans-serif">
  
  <defs>
    <style>
      .pkt { offset-distance: 0%; animation: wfPacket 4.2s linear infinite; }
      .pkt-2 { animation-duration: 3.6s; }
      .pkt-d1 { animation-delay: 0s; }
      .pkt-d2 { animation-delay: 0.8s; }
      .pkt-d3 { animation-delay: 1.6s; }
      .agent-pulse { opacity: 0; animation: wfAgentPulse 2.4s ease-in-out infinite; }
      .dot1, .dot2, .dot3 { animation: wfDot 1.2s ease-in-out infinite; }
      .dot2 { animation-delay: 0.18s; }
      .dot3 { animation-delay: 0.36s; }
      .par { animation: wfParallel 2.2s ease-in-out infinite; }
      .hitl-edge { animation: wfDash 1.2s linear infinite; }
      .hitl-pkt { offset-distance: 0%; animation: wfHitlPacket 2.4s linear infinite; }
      @keyframes wfPacket { from { offset-distance: 0%; opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } to { offset-distance: 100%; opacity: 0; } }
      @keyframes wfAgentPulse { 0%, 100% { opacity: 0; } 45% { opacity: 0.14; } }
      @keyframes wfDot { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }
      @keyframes wfParallel { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
      @keyframes wfDash { to { stroke-dashoffset: -16; } }
      @keyframes wfHitlPacket { 0% { offset-distance: 0%; opacity: 0; } 18% { opacity: 1; } 82% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
    </style>
    <linearGradient id="wf-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A0E1A"></stop><stop offset="100%" stop-color="#0F1320"></stop></linearGradient>
    <pattern id="wf-grid" width="32" height="32" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#1F2937"></circle></pattern>
    <filter id="wf-glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="4"></feGaussianBlur><feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
    <linearGradient id="wf-edge-violet" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7C3AED" stop-opacity="0.2"></stop><stop offset="50%" stop-color="#A78BFA" stop-opacity="1"></stop><stop offset="100%" stop-color="#22D3EE" stop-opacity="0.4"></stop></linearGradient>
    <linearGradient id="wf-edge-cyan" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22D3EE" stop-opacity="0.2"></stop><stop offset="100%" stop-color="#10D9A0" stop-opacity="1"></stop></linearGradient>
  </defs>

