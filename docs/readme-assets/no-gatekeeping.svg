<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" width="1280" height="520" fill="none" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .ng-pulse { opacity: 0; animation: ngPulse 4.8s ease-in-out infinite; }
      .ng-d0 { animation-delay: 0s; }
      .ng-d1 { animation-delay: 0.45s; }
      .ng-d2 { animation-delay: 0.9s; }
      .ng-d3 { animation-delay: 1.35s; }
      .ng-d4 { animation-delay: 1.8s; }
      .ng-d5 { animation-delay: 2.25s; }
      @keyframes ngPulse {
        0%, 20%, 100% { opacity: 0; transform: scale(1); }
        30% { opacity: 0.9; transform: scale(1.01); }
        48% { opacity: 0; transform: scale(1.03); }
      }
    </style>
    <linearGradient id="ng-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0A0E1A"></stop><stop offset="100%" stop-color="#0F1320"></stop></linearGradient>
    <pattern id="ng-grid" width="32" height="32" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#1F2937"></circle></pattern>
    <linearGradient id="ng-heym-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10D9A0"></stop><stop offset="100%" stop-color="#22D3EE"></stop></linearGradient>
    <filter id="ng-glow"><feGaussianBlur stdDeviation="3"></feGaussianBlur><feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
  </defs>


