<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" width="1280" height="460" fill="none" font-family="Inter, system-ui, sans-serif">
  
  <defs>
    <style>
      .ai-mic { animation: aiMic 1.4s ease-in-out infinite; }
      .ai-l { animation: aiLine 5.6s ease-in-out infinite; }
      .ai-l1 { animation-delay: 0.45s; }
      .ai-l2 { animation-delay: 0.8s; }
      .ai-l3 { animation-delay: 1.15s; }
      .ai-l4 { animation-delay: 1.5s; }
      .ai-l5 { animation-delay: 1.85s; }
      .ai-l6 { animation-delay: 2.2s; }
      .ai-caret { animation: aiCaret 0.9s steps(2, start) infinite; }
      .ai-e-in { animation: aiEdgeIn 5.6s ease-in-out infinite; }
      .ai-e-branch { animation: aiBranchEdges 5.6s ease-in-out infinite; }
      .ai-n { animation: aiNodeIn 5.6s ease-in-out infinite; }
      .ai-n1 { animation-delay: 1.1s; }
      .ai-n2 { animation-delay: 1.55s; }
      .ai-n3 { animation-delay: 2s; }
      .ai-n4 { animation-delay: 2.35s; }
      .ai-pkt-c { offset-distance: 0%; opacity: 0; }
      .ai-pkt-1 { animation: aiPacketIn 5.6s linear infinite; }
      .ai-pkt-2 { animation: aiPacketBranchTop 5.6s linear infinite; }
      .ai-pkt-3 { animation: aiPacketBranchBottom 5.6s linear infinite; }
      .ai-ready { animation: aiReady 5.6s ease-in-out infinite; }
      @keyframes aiMic { 0%, 100% { opacity: 0.45; r: 4px; } 50% { opacity: 1; r: 7px; } }
      @keyframes aiLine { 0%, 15% { opacity: 0; transform: translateY(5px); } 25%, 78% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-3px); } }
      @keyframes aiCaret { 50% { opacity: 0; } }
      @keyframes aiEdgeIn { 0%, 50% { opacity: 0; } 60%, 88% { opacity: 1; } 100% { opacity: 0; } }
      @keyframes aiBranchEdges { 0%, 70% { opacity: 0; } 78%, 98% { opacity: 1; } 100% { opacity: 0; } }
      @keyframes aiNodeIn { 0%, 30% { opacity: 0; } 44%, 88% { opacity: 1; } 100% { opacity: 0; } }
      @keyframes aiPacketIn { 0%, 56% { offset-distance: 0%; opacity: 0; } 62% { opacity: 1; } 80% { offset-distance: 100%; opacity: 1; } 88%, 100% { offset-distance: 100%; opacity: 0; } }
      @keyframes aiPacketBranchTop { 0%, 88% { offset-distance: 0%; opacity: 0; } 90% { opacity: 1; } 97% { offset-distance: 100%; opacity: 1; } 99%, 100% { offset-distance: 100%; opacity: 0; } }
      @keyframes aiPacketBranchBottom { 0%, 90% { offset-distance: 0%; opacity: 0; } 92% { opacity: 1; } 98% { offset-distance: 100%; opacity: 1; } 99.5%, 100% { offset-distance: 100%; opacity: 0; } }
      @keyframes aiReady { 0%, 55% { opacity: 0; } 68%, 90% { opacity: 1; } 100% { opacity: 0; } }
    </style>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0A0E1A"></stop><stop offset="100%" stop-color="#0F1320"></stop></linearGradient>
    <pattern id="ai-grid" width="32" height="32" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#1F2937"></circle></pattern>
    <filter id="ai-glow"><feGaussianBlur stdDeviation="4"></feGaussianBlur><feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
    <linearGradient id="ai-edge-green" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10D9A0" stop-opacity="0.2"></stop><stop offset="100%" stop-color="#10D9A0" stop-opacity="1"></stop></linearGradient>
    <linearGradient id="ai-edge-violet" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7C3AED" stop-opacity="0.2"></stop><stop offset="100%" stop-color="#A78BFA" stop-opacity="1"></stop></linearGradient>
    <linearGradient id="ai-edge-cyan" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22D3EE" stop-opacity="0.2"></stop><stop offset="100%" stop-color="#22D3EE" stop-opacity="1"></stop></linearGradient>
  </defs>

  <rect width="1280" height="460" fill="url(#ai-bg)"></rect>
  <rect width="1280" height="460" fill="url(#ai-grid)"></rect>

  
  <g transform="translate(40, 40)">
    <rect width="440" height="380" rx="16" fill="#0F1320" stroke="#1F2937"></rect>
    <rect width="440" height="44" rx="16" fill="#151B2E"></rect>
    <rect y="28" width="440" height="16" fill="#151B2E"></rect>
    <g transform="translate(16, 14)"><rect width="28" height="18" rx="5" fill="#7C3AED"></rect><text x="14" y="13" text-anchor="middle" fill="white" font-size="10" font-weight="800">AI</text></g>
    <text x="56" y="28" fill="#F3F4F6" font-size="13" font-weight="600">Heym Assistant</text>
    <circle cx="416" cy="22" r="4" fill="#10D9A0" class="ai-mic"></circle>

    <g transform="translate(20, 70)">
      <rect width="400" height="72" rx="12" fill="#151B2E" stroke="#1F2937"></rect>
      <text x="16" y="22" font-size="10.5" fill="#6B7280" font-family="&#39;JetBrains Mono&#39;, monospace">YOU · 0.2s</text>
      <text x="16" y="44" font-size="13" fill="#E5E7EB">When a Notion page is updated,</text>
      <text x="16" y="62" font-size="13" fill="#E5E7EB">summarize it with an agent and post to Slack.</text>
    </g>

    <g transform="translate(20, 162)">
      <rect width="400" height="200" rx="12" fill="#7C3AED" fill-opacity="0.08" stroke="#7C3AED" stroke-opacity="0.35"></rect>
      <text x="16" y="22" font-size="10.5" fill="#A78BFA" font-family="&#39;JetBrains Mono&#39;, monospace">HEYM · GENERATING</text>

      <g font-size="12" font-family="&#39;JetBrains Mono&#39;, monospace">
        <text x="16" y="48" fill="#9CA3AF" class="ai-l ai-l1" opacity="0">
          <tspan fill="#10D9A0">▸</tspan> Detected pattern: trigger → agent → output
        </text>
        <text x="16" y="70" fill="#9CA3AF" class="ai-l ai-l2" opacity="0">
          <tspan fill="#22D3EE">+</tspan> Notion Webhook trigger
        </text>
        <text x="16" y="92" fill="#9CA3AF" class="ai-l ai-l3" opacity="0">
          <tspan fill="#22D3EE">+</tspan> Agent · model: <tspan fill="#A78BFA">claude-sonnet-4</tspan>
        </text>
        <text x="16" y="114" fill="#9CA3AF" class="ai-l ai-l4" opacity="0">
          <tspan fill="#22D3EE">+</tspan> Tool: <tspan fill="#A78BFA">notion.get_page</tspan>
        </text>
        <text x="16" y="136" fill="#9CA3AF" class="ai-l ai-l5" opacity="0">
          <tspan fill="#22D3EE">+</tspan> Tool: <tspan fill="#A78BFA">slack.post_message</tspan>
        </text>
        <text x="16" y="158" fill="#9CA3AF" class="ai-l ai-l6" opacity="0">
          <tspan fill="#10D9A0">✓</tspan> Wired 4 nodes · saved as draft
        </text>
        <rect x="16" y="166" width="7" height="13" fill="#A78BFA" class="ai-caret"></rect>
      </g>

      <g transform="translate(360, 16)">
        <circle cx="14" cy="14" r="14" fill="#7C3AED" fill-opacity="0.15" stroke="#7C3AED" stroke-opacity="0.4"></circle>
        <rect x="11" y="7" width="6" height="10" rx="3" fill="#A78BFA"></rect>
        <path d="M 8 14 C 8 17, 10 19, 14 19 C 18 19, 20 17, 20 14" stroke="#A78BFA" stroke-width="1.4" fill="none"></path>
        <line x1="14" y1="19" x2="14" y2="22" stroke="#A78BFA" stroke-width="1.4"></line>
      </g>
    </g>
  </g>

  <g transform="translate(498, 220)">
    <path d="M 0 0 L 32 0" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"></path>
    <path d="M 24 -6 L 32 0 L 24 6" stroke="#7C3AED" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
    <text x="16" y="-10" text-anchor="middle" font-size="10" font-family="&#39;JetBrains Mono&#39;, monospace" fill="#A78BFA">auto-wire</text>
  </g>

  
  <g transform="translate(550, 40)">
    <rect width="690" height="380" rx="16" fill="#0F1320" stroke="#1F2937"></rect>
    <rect width="690" height="32" rx="16" fill="#151B2E"></rect>
    <rect y="16" width="690" height="16" fill="#151B2E"></rect>
    <text x="16" y="20" font-size="11" font-family="&#39;JetBrains Mono&#39;, monospace" fill="#6B7280">canvas / new-workflow.heym</text>

    <g fill="none" stroke-width="2" stroke-linecap="round">
      <path class="ai-e-in" opacity="0" d="M 140 130 C 200 130, 220 184, 260 184" stroke="url(#ai-edge-green)"></path>
      <path class="ai-e-branch" opacity="0" d="M 400 171 C 440 171, 460 130, 500 130" stroke="url(#ai-edge-violet)"></path>
      <path class="ai-e-branch" opacity="0" d="M 400 199 C 440 199, 460 260, 500 260" stroke="url(#ai-edge-cyan)"></path>
    </g>

    <circle r="4" fill="#10D9A0" filter="url(#ai-glow)" class="ai-pkt-c ai-pkt-1" style="offset-path: path(&#39;M 140 130 C 200 130, 220 184, 260 184&#39;);"></circle>
    <circle r="4" fill="#A78BFA" filter="url(#ai-glow)" class="ai-pkt-c ai-pkt-2" style="offset-path: path(&#39;M 400 171 C 440 171, 460 130, 500 130&#39;);"></circle>
    <circle r="4" fill="#22D3EE" filter="url(#ai-glow)" class="ai-pkt-c ai-pkt-3" style="offset-path: path(&#39;M 400 199 C 440 199, 460 260, 500 260&#39;);"></circle>

    <g transform="translate(40, 100)" class="ai-n ai-n1" opacity="0">
      <rect width="100" height="60" rx="10" fill="#0F1320" stroke="#10D9A0" stroke-opacity="0.7"></rect>
      <rect width="100" height="5" rx="2" fill="#10D9A0"></rect>
      <g transform="translate(12, 18)"><rect width="22" height="22" rx="5" fill="#10D9A0" fill-opacity="0.18"></rect><path d="M 6 6 L 16 6 L 16 16 L 6 16 Z M 6 11 L 16 11" stroke="#10D9A0" stroke-width="1.4" fill="none"></path></g>
      <text x="40" y="28" font-size="9.5" fill="#6B7280" font-family="&#39;JetBrains Mono&#39;, monospace">NOTION</text>
      <text x="40" y="44" font-size="11" fill="#F3F4F6" font-weight="600">Webhook</text>
      <circle cx="100" cy="30" r="3.5" fill="#10D9A0"></circle>
    </g>

    <g transform="translate(260, 146)" class="ai-n ai-n2" opacity="0">
      <rect width="140" height="76" rx="10" fill="#0F1320" stroke="#7C3AED" stroke-opacity="0.7"></rect>
      <rect width="140" height="5" rx="2" fill="#7C3AED"></rect>
      <g transform="translate(12, 18)"><rect width="22" height="22" rx="5" fill="#7C3AED" fill-opacity="0.2"></rect><circle cx="11" cy="11" r="3" fill="#A78BFA"></circle><path d="M 6 6 L 6 16 M 16 6 L 16 16" stroke="#A78BFA" stroke-width="1.4"></path></g>
      <text x="40" y="28" font-size="9.5" fill="#6B7280" font-family="&#39;JetBrains Mono&#39;, monospace">AGENT</text>
      <text x="40" y="44" font-size="11" fill="#F3F4F6" font-weight="600">Summarize</text>
      <text x="40" y="58" font-size="9.5" fill="#9CA3AF" font-family="&#39;JetBrains Mono&#39;, monospace">claude-sonnet-4</text>
      <circle cx="0" cy="38" r="3.5" fill="#7C3AED"></circle>
      <circle cx="140" cy="25" r="3.5" fill="#A78BFA"></circle>
      <circle cx="140" cy="53" r="3.5" fill="#22D3EE"></circle>
    </g>

    <g transform="translate(500, 100)" class="ai-n ai-n3" opacity="0">
      <rect width="150" height="60" rx="10" fill="#0F1320" stroke="#22D3EE" stroke-opacity="0.7"></rect>
      <rect width="150" height="5" rx="2" fill="#22D3EE"></rect>
      <g transform="translate(12, 18)"><rect width="22" height="22" rx="5" fill="#22D3EE" fill-opacity="0.18"></rect><path d="M 7 7 L 7 15 M 11 9 L 11 15 M 15 11 L 15 15" stroke="#22D3EE" stroke-width="1.6" stroke-linecap="round"></path></g>
      <text x="40" y="28" font-size="9.5" fill="#6B7280" font-family="&#39;JetBrains Mono&#39;, monospace">MCP TOOL</text>
      <text x="40" y="44" font-size="10" fill="#F3F4F6" font-weight="600">notion.get_page</text>
      <circle cx="0" cy="30" r="3.5" fill="#22D3EE"></circle>
    </g>

    <g transform="translate(500, 230)" class="ai-n ai-n4" opacity="0">
      <rect width="150" height="60" rx="10" fill="#0F1320" stroke="#22D3EE" stroke-opacity="0.7"></rect>
      <rect width="150" height="5" rx="2" fill="#22D3EE"></rect>
      <g transform="translate(12, 18)"><rect width="22" height="22" rx="5" fill="#22D3EE" fill-opacity="0.18"></rect><path d="M 7 9 H 15 M 7 13 H 13" stroke="#22D3EE" stroke-width="1.6" stroke-linecap="round"></path></g>
      <text x="40" y="28" font-size="9.5" fill="#6B7280" font-family="&#39;JetBrains Mono&#39;, monospace">MCP TOOL</text>
      <text x="40" y="44" font-size="10" fill="#F3F4F6" font-weight="600">slack.post_message</text>
      <circle cx="0" cy="30" r="3.5" fill="#22D3EE"></circle>
    </g>

    <text x="345" y="340" text-anchor="middle" font-size="11" font-family="&#39;JetBrains Mono&#39;, monospace" fill="#10D9A0" class="ai-ready" opacity="0">✓ workflow ready · 1.2s</text>
  </g>
</svg>
