name: Dependabot automerge

on:
  workflow_run:
    workflows:
      - PR checks
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-automerge-${{ github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  automerge:
    name: Merge successful Dependabot PR
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != ''

    steps:
      - name: Inspect pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          author="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json author --jq '.author.login')"
          head_ref="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefName --jq '.headRefName')"
          is_draft="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')"
          state="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state --jq '.state')"

          is_dependabot=false
          if [ "$author" = "dependabot[bot]" ] || [ "$author" = "dependabot" ]; then
            is_dependabot=true
          fi

          should_merge=false
          if [ "$is_dependabot" = "true" ] && [ "$is_draft" = "false" ] && [ "$state" = "OPEN" ]; then
            should_merge=true
          fi

          echo "PR #$PR_NUMBER author=$author head=$head_ref draft=$is_draft state=$state should_merge=$should_merge"
          echo "### Dependabot automerge" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: #$PR_NUMBER" >> "$GITHUB_STEP_SUMMARY"
          echo "- Author: $author" >> "$GITHUB_STEP_SUMMARY"
          echo "- Head branch: $head_ref" >> "$GITHUB_STEP_SUMMARY"
          echo "- Draft: $is_draft" >> "$GITHUB_STEP_SUMMARY"
          echo "- State: $state" >> "$GITHUB_STEP_SUMMARY"
          echo "- Should merge: $should_merge" >> "$GITHUB_STEP_SUMMARY"
          echo "should_merge=$should_merge" >> "$GITHUB_OUTPUT"

      - name: Approve pull request
        if: steps.pr.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: gh pr review "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --approve

      - name: Enable auto-merge
        if: steps.pr.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash
